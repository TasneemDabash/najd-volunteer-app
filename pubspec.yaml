name: najd_volunteer
description: Najd Volunteer - Volunteer Coordination Mobile App for iOS and Android.
publish_to: 'none'
version: 1.0.0+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.3.0
  provider: ^6.1.1
  intl: ^0.20.2
  url_launcher: ^6.2.4
  # Voice message recording / playback
  record: ^5.1.2
  just_audio: ^0.9.40
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  # Push notifications
  firebase_core: ^3.8.1
  firebase_messaging: ^15.2.1
  # Excel export
  excel: ^4.0.6
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  ios: false
  android: true
  image_path: "assets/icon/App_icon.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/App_icon.png"
    background_color: "#ffffff"
    theme_color: "#2196F3"
  macos:
    generate: true
    image_path: "assets/icon/App_icon.png"

# `record` 5.1.2 pins `record_linux: ^0.7.2`, which doesn't implement the
# `startStream` method added in `record_platform_interface` 1.4.0+. Even though
# the linux plugin isn't used on iOS/Android, Flutter still compiles every
# Dart platform implementation, so the build fails. Bumping `record_linux` to
# 1.3.x (which implements `startStream`) unblocks iOS/Android builds.
dependency_overrides:
  record_linux: ^1.3.0
  record_platform_interface: ^1.5.0

flutter:
  uses-material-design: true
