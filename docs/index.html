<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نجد - Najd App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; line-height: 1.8; background: linear-gradient(135deg, #1a237e 0%, #3949ab 100%); min-height: 100vh; color: white; }
        .container { max-width: 600px; margin: 0 auto; padding: 60px 20px; text-align: center; }
        .logo { width: 120px; height: 120px; background: white; border-radius: 24px; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; font-size: 48px; color: #1a237e; font-weight: bold; }
        h1 { font-size: 42px; margin-bottom: 10px; }
        .subtitle { font-size: 18px; opacity: 0.9; margin-bottom: 40px; }
        .links { display: flex; flex-direction: column; gap: 15px; max-width: 300px; margin: 0 auto; }
        .links a { display: block; padding: 15px 30px; background: white; color: #1a237e; text-decoration: none; border-radius: 12px; font-weight: 600; transition: transform 0.2s; }
        .links a:hover { transform: scale(1.05); }
        .footer { margin-top: 60px; opacity: 0.7; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">نجد</div>
        <h1>نجد</h1>
        <p class="subtitle">تطبيق إدارة وتنسيق العمل التطوعي<br>Volunteer Management App</p>

        <div class="links">
            <a href="privacy.html">سياسة الخصوصية | Privacy Policy</a>
            <a href="terms.html">شروط الاستخدام | Terms of Service</a>
        </div>

        <div class="footer">
            <p>© 2026 Najd App. جميع الحقوق محفوظة</p>
            <p>support@najd-app.com</p>
        </div>
    </div>
</body>
</html>
